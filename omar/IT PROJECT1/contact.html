<main>
    <section class="contact">
        <h1>Contact Us</h1>
        <p>If you have any questions about our PC components or your order, please fill the form below and our team will reply as soon as possible.</p>
        
        <fieldset>
            <legend><h2>Send a Message</h2></legend>
            
            <form class="contact-form" action="#" method="POST">
                
                <div class="form-group">
                    <label for="contact-name">Name:</label>
                    <input type="text" id="contact-name" name="customerName" class="input-field">
                </div>

                <div class="form-group">
                    <label for="contact-email">Email:</label>
                    <input type="email" id="contact-email" name="customerEmail" class="input-field">
                </div>

                <div class="form-group">
                    <label for="contact-subject">Subject:</label>
                    <input type="text" id="contact-subject" name="messageSubject" class="input-field">
                </div>

                <div class="form-group">
                    <label for="contact-message">Message:</label>
                    <textarea id="contact-message" name="messageBody" class="input-field" rows="5"></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" id="submit-btn" name="sendButton" class="btn">Send Message</button>
                </div>

            </form>
        </fieldset>
    </section>
</main>
