<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
    <nav>
        <h3>CompuHub</h3>
        <div class="navigation">
            <a href="">Home</a>
            <a href="">products</a>
            <a href="">about</a>
            <a href="">contact us</a>
            <a href="">darkmode</a>
            <a href="">profile</a>
        </div>
    </nav>
</header>

<main>
    <section class="profile">
        <h1>User Profile</h1>
        
        <fieldset>
            <legend><h2>Your Information</h2></legend>
            
            <form class="profile-form" action="#" method="POST">
                
                <div class="form-group">
                    <label for="profile-name">Full Name:</label>
                    <input type="text" id="profile-name" name="fullName" class="input-field" value="User Name" disabled>
                </div>

                <div class="form-group">
                    <label for="profile-email">Email Address:</label>
                    <input type="email" id="profile-email" name="emailAddress" class="input-field" value="user@email.com" disabled>
                </div>

                <div class="form-group">
                    <label for="profile-password">Password:</label>
                    <input type="password" id="profile-password" name="password" class="input-field" value="12345678" disabled>
                </div>

                <div class="form-group">
                    <label for="profile-address">Shipping Address:</label>
                    <input type="text" id="profile-address" name="address" class="input-field" value="Cairo, Egypt" disabled>
                </div>

                <div class="form-actions">
                    <button type="button" id="edit-btn" name="editButton" class="btn">Edit Info</button>
                    <button type="submit" id="save-btn" name="saveButton" class="btn">Save Changes</button>
                </div>

            </form>
        </fieldset>
    </section>
</main>

<footer>

    </nav>
</footer>

</body>
</html>
